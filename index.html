                this.player.segment1.pos.y - 80,
                `🏆 ${title}`,
                '#ffd700',
                28,
                3.0
            ));
            console.log(`Achievement Unlocked: ${title} - ${desc}`);
        }

        updateCamera(dt) {
            this.targetCamera.x = this.player.segment1.pos.x - this.canvas.width / 2;
            this.targetCamera.y = this.player.segment1.pos.y - this.canvas.height / 2;

            this.camera.x = lerp(this.camera.x, this.targetCamera.x, CONFIG.CAMERA_SMOOTHING);
            this.camera.y = lerp(this.camera.y, this.targetCamera.y, CONFIG.CAMERA_SMOOTHING);

            const shake = this.screenShake.getOffset();
            this.camera.x += shake.x;
            this.camera.y += shake.y;
        }

        updateUI() {
            const heightEl = document.getElementById('height');
            const timeEl = document.getElementById('time');
            const fallsEl = document.getElementById('falls');
            const hookHealthEl = document.getElementById('hookHealthVal');

            heightEl.innerHTML = `Height: <span style="color: #4ecdc4;">${Math.floor(this.maxHeight)}m</span>`;
            timeEl.innerHTML = `Time: <span style="color: #ffe66d;">${Math.floor(this.playTime)}s</span>`;
            fallsEl.innerHTML = `Falls: <span style="color: #ff6b6b;">${this.falls}</span>`;
            
            const hookPercent = Math.floor((this.player.hookDurability / CONFIG.HOOK_DURABILITY_MAX) * 100);
            let hookColor = '#95e1d3';
            if (hookPercent < 50) hookColor = '#fdcb6e';
            if (hookPercent < 25) hookColor = '#d63031';
            hookHealthEl.style.color = hookColor;
            hookHealthEl.textContent = `${hookPercent}%`;
            
            if (hookPercent < 25) {
                document.getElementById('hookHealth').classList.add('warning');
            } else {
                document.getElementById('hookHealth').classList.remove('warning');
            }

            if (this.maxHeight > this.records.bestHeight) {
                this.records.bestHeight = this.maxHeight;
            }

            const bestHeightEl = document.getElementById('bestHeight');
            bestHeightEl.innerHTML = `🏆 Best Height: <span style="color: #4ecdc4;">${Math.floor(this.records.bestHeight)}m</span>`;

            const bestTimeEl = document.getElementById('bestTime');
            if (this.records.bestTime !== null) {
                bestTimeEl.innerHTML = `⚡ Fastest: <span style="color: #ffe66d;">${Math.floor(this.records.bestTime)}s</span>`;
            }

            const leastFallsEl = document.getElementById('leastFalls');
            if (this.records.leastFalls !== null) {
                leastFallsEl.innerHTML = `💎 Least Falls: <span style="color: #95e1d3;">${this.records.leastFalls}</span>`;
            }
        }

        autoSave() {
            if (Math.random() < 0.005) {
                this.saveGame();
            }
        }

        saveGame() {
            const data = {
                maxHeight: this.maxHeight,
                playTime: this.playTime,
                falls: this.falls,
                records: this.records,
                spawnPoint: {
                    x: this.player.spawnPoint.x,
                    y: this.player.spawnPoint.y
                },
                hookLaunches: this.hookLaunches,
                totalDistance: this.totalDistance,
                platformsTouched: this.platformsTouched
            };

            this.saveSystem.save(data);
        }

        loadGame() {
            const data = this.saveSystem.load();
            
            if (data) {
                this.maxHeight = data.maxHeight || 0;
                this.falls = data.falls || 0;
                this.records = data.records || this.records;
                this.hookLaunches = data.hookLaunches || 0;
                this.totalDistance = data.totalDistance || 0;
                this.platformsTouched = data.platformsTouched || 0;
                
                if (data.spawnPoint) {
                    this.player.spawnPoint = new Vec2(data.spawnPoint.x, data.spawnPoint.y);
                    this.player.respawn();
                }
            }
        }

        render() {
            this.ctx.fillStyle = '#0a0a0f';
            this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

            this.drawBackground();

            this.ctx.save();
            
            this.map.draw(this.ctx, this.camera);
            this.particles.draw(this.ctx, this.camera);
            this.animations.draw(this.ctx, this.camera);
            this.player.draw(this.ctx, this.camera);

            this.ctx.restore();

            this.wind.draw(this.ctx, this.canvas.width, this.canvas.height);
            this.drawUI();
            this.miniMap.draw(this.ctx, this.player, [...this.map.platforms, ...this.map.movingPlatforms], 
                             this.camera, this.canvas.width, this.canvas.height);
            this.tutorial.draw(this.ctx, this.canvas.width, this.canvas.height);

            if (this.combo.getCombo() > 1) {
                this.drawCombo();
            }

            if (this.paused) {
                this.drawPauseScreen();
            }

            if (this.showHelp) {
                this.drawHelpScreen();
            }
        }

        drawBackground() {
            const gradient = this.ctx.createLinearGradient(0, 0, 0, this.canvas.height);
            gradient.addColorStop(0, 'rgba(10, 10, 20, 0)');
            gradient.addColorStop(0.5, 'rgba(30, 20, 50, 0.4)');
            gradient.addColorStop(1, 'rgba(10, 10, 20, 0)');
            this.ctx.fillStyle = gradient;
            this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

            for (const star of this.backgroundStars) {
                star.twinkle += 0.02;
                const alpha = star.alpha * (0.7 + Math.sin(star.twinkle) * 0.3);
                
                const parallaxY = star.y - this.camera.y * 0.1;
                const parallaxX = star.x - this.camera.x * 0.1;
                
                const screenY = parallaxY % (this.canvas.height + 200);
                
                this.ctx.save();
                this.ctx.globalAlpha = alpha;
                this.ctx.fillStyle = '#ffffff';
                this.ctx.beginPath();
                this.ctx.arc(
                    parallaxX % this.canvas.width,
                    screenY,
                    star.size,
                    0,
                    Math.PI * 2
                );
                this.ctx.fill();
                this.ctx.restore();
            }
        }

        drawCombo() {
            const comboText = `${this.combo.getCombo()}x COMBO`;
            const multiplierText = `${this.combo.getMultiplier().toFixed(1)}x`;

            this.ctx.save();
            this.ctx.font = 'bold 24px Courier New';
            this.ctx.fillStyle = '#fdcb6e';
            this.ctx.textAlign = 'center';
            this.ctx.strokeStyle = '#000';
            this.ctx.lineWidth = 4;
            this.ctx.strokeText(comboText, this.canvas.width / 2, 150);
            this.ctx.fillText(comboText, this.canvas.width / 2, 150);

            this.ctx.font = '16px Courier New';
            this.ctx.fillStyle = '#ffeaa7';
            this.ctx.fillText(multiplierText, this.canvas.width / 2, 175);
            this.ctx.restore();
        }

        drawPauseScreen() {
            this.ctx.save();
            this.ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

            this.ctx.fillStyle = '#fff';
            this.ctx.font = 'bold 48px Courier New';
            this.ctx.textAlign = 'center';
            this.ctx.fillText('PAUSED', this.canvas.width / 2, this.canvas.height / 2 - 50);

            this.ctx.font = '20px Courier New';
            this.ctx.fillText('Press P or ESC to resume', this.canvas.width / 2, this.canvas.height / 2 + 20);
            this.ctx.fillText('Press H for help', this.canvas.width / 2, this.canvas.height / 2 + 50);
            this.ctx.restore();
        }

        drawHelpScreen() {
            this.ctx.save();
            this.ctx.fillStyle = 'rgba(0, 0, 0, 0.9)';
            this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

            this.ctx.fillStyle = '#fdcb6e';
            this.ctx.font = 'bold 36px Courier New';
            this.ctx.textAlign = 'center';
            this.ctx.fillText('CONTROLS & TIPS', this.canvas.width / 2, 80);

            this.ctx.fillStyle = '#fff';
            this.ctx.font = '18px Courier New';
            this.ctx.textAlign = 'left';

            const tips = [
                'MOUSE/TOUCH: Click & drag to launch hook',
                'SPACE: Release hook',
                'P / ESC: Pause game',
                'M: Toggle minimap',
                'S: Toggle sound',
                'R: Reset progress',
                '',
                'PLATFORM TYPES:',
                '  White: Normal platforms',
                '  Red: Crumbling platforms (disappear after touch)',
                '  Purple: Phantom platforms (phase in/out)',
                '  Green: Spring platforms (bounce upward)',
                '  Yellow: Rotating obstacles',
                '',
                'MECHANICS:',
                '  • Hook durability decreases with high force',
                '  • Wind pushes you randomly',
                '  • Gravity zones alter direction',
                '  • Build combos by chaining successful hooks',
                '  • Checkpoints save your progress',
                '',
                'Press H to close'
            ];

            let y = 150;
            for (const tip of tips) {
                this.ctx.fillText(tip, 100, y);
                y += 30;
            }

            this.ctx.restore();
        }

        drawUI() {
            if (this.mouseDown && !this.player.hook) {
                this.ctx.save();
                this.ctx.strokeStyle = 'rgba(253, 203, 110, 0.4)';
                this.ctx.lineWidth = 2;
                this.ctx.setLineDash([10, 10]);
                this.ctx.beginPath();
                this.ctx.moveTo(
                    this.player.segment1.pos.x - this.camera.x,
                    this.player.segment1.pos.y - this.camera.y
                );
                this.ctx.lineTo(this.mousePos.x, this.mousePos.y);
                this.ctx.stroke();
                this.ctx.restore();

                this.ctx.save();
                this.ctx.fillStyle = 'rgba(253, 203, 110, 0.6)';
                this.ctx.beginPath();
                this.ctx.arc(this.mousePos.x, this.mousePos.y, 8, 0, Math.PI * 2);
                this.ctx.fill();
                this.ctx.restore();
            }

            this.ctx.save();
            this.ctx.strokeStyle = 'rgba(255, 107, 107, 0.3)';
            this.ctx.lineWidth = 2;
            this.ctx.setLineDash([5, 15]);
            const deathY = CONFIG.DEATH_ZONE_Y - this.camera.y;
            if (deathY > -100 && deathY < this.canvas.height + 100) {
                this.ctx.beginPath();
                this.ctx.moveTo(0, deathY);
                this.ctx.lineTo(this.canvas.width, deathY);
                this.ctx.stroke();

                this.ctx.font = '12px Courier New';
                this.ctx.fillStyle = 'rgba(255, 107, 107, 0.5)';
                this.ctx.textAlign = 'center';
                this.ctx.fillText('DEATH ZONE', this.canvas.width / 2, deathY - 5);
            }
            this.ctx.restore();

            if (CONFIG.DEBUG) {
                this.ctx.save();
                this.ctx.fillStyle = '#fff';
                this.ctx.font = '12px Courier New';
                this.ctx.fillText(`FPS: ${this.fps}`, 10, this.canvas.height - 40);
                this.ctx.fillText(`Hooks: ${this.hookLaunches}`, 10, this.canvas.height - 25);
                this.ctx.fillText(`Success: ${this.successfulHooks}`, 10, this.canvas.height - 10);
                this.ctx.restore();
            }
        }
    }

    window.addEventListener('load', () => {
        new Game();
    });
</script>
